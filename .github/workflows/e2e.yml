name: E2E

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      RESEND_API_KEY: re_dummy_test_key
      INNGEST_EVENT_KEY: test_dummy
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      PLAYWRIGHT_BASE_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Get pnpm store path
        shell: bash
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Start local Supabase
        run: supabase start

      - name: Export Supabase credentials
        shell: bash
        run: |
          supabase status --output env > supabase-status.env

          anon_key="$(grep '^ANON_KEY=' supabase-status.env | cut -d= -f2-)"
          service_role_key="$(grep '^SERVICE_ROLE_KEY=' supabase-status.env | cut -d= -f2-)"

          if [[ -z "$anon_key" || -z "$service_role_key" ]]; then
            echo "Failed to extract Supabase local anon/service role keys." >&2
            cat supabase-status.env >&2
            exit 1
          fi

          {
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$anon_key"
            echo "SUPABASE_SERVICE_ROLE_KEY=$service_role_key"
          } >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database schema
        run: pnpm db:setup

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: pnpm exec playwright test

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
